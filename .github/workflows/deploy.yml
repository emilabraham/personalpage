name: Deploy
on:
  push:
    branches:
    - 'master'
jobs:
  ssh-pull-hugo:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{secrets.HOST_IP}}
        username: ${{secrets.USERNAME}}
        key: ${{secrets.SSH_PRIVATE_KEY}}
        script: |
          pwd
          ls
